services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evidex_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: evidex
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evidex-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6381:6379"
    networks:
      - evidex-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - evidex-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "3000:3000"
    networks:
      - evidex-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web
    networks:
      - evidex-network

volumes:
  postgres_data:

networks:
  evidex-network:
    driver: bridge
